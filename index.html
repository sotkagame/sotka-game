<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СОТКА 100 VIP</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(180deg,#081633,#020816);
    color:gold;
    text-align:center;
    overflow:hidden;
}

.header{
    font-size:48px;
    font-weight:bold;
    margin-top:20px;
    text-shadow:0 0 20px gold;
}

.top-bar{
    display:flex;
    justify-content:space-around;
    color:white;
    font-size:18px;
    margin-top:10px;
}

.circle{
    width:190px;
    height:190px;
    margin:20px auto;
    border:6px solid gold;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:90px;
    box-shadow:0 0 30px gold;
    animation:spin 3s linear infinite;
}

@keyframes spin{
    from{transform:rotateY(0deg);}
    to{transform:rotateY(360deg);}
}

.timer{
    font-size:24px;
    margin-bottom:15px;
}

.wheels{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
}

select{
    width:110px;
    height:240px;
    font-size:30px;
    background:#102a66;
    color:gold;
    border:3px solid gold;
    border-radius:20px;
}

button{
    margin-top:18px;
    font-size:20px;
    padding:12px 24px;
    border:none;
    border-radius:12px;
    background:gold;
    color:black;
    font-weight:bold;
}

.result{
    margin-top:20px;
    font-size:28px;
    color:white;
}

.crown{
    font-size:60px;
    display:none;
}

.coins{
    font-size:80px;
    display:none;
    animation:pop 1s ease;
}

@keyframes pop{
    from{transform:scale(0);}
    to{transform:scale(1);}
}

.bottom-panel{
    margin-top:20px;
    color:white;
}

.vip{
    margin-top:10px;
    color:#d4af37;
    font-size:22px;
}
</style>
</head>

<body>

<div class="header">СОТКА 100</div>

<div class="top-bar">
    <div id="player1info">Игрок 1 ⭐ Рейтинг: 1000</div>
    <div id="player2info">Игрок 2 ⭐ Рейтинг: 1000</div>
</div>

<div class="circle" id="circle">?</div>

<div class="timer" id="timer">Выберите число: 15</div>

<div class="wheels">
    <select id="p1" size="5"></select>
    <select id="p2" size="5"></select>
</div>

<button onclick="fixNumbers()">Зафиксировать</button>

<div class="result" id="result"></div>
<div class="crown" id="crown">👑</div>
<div class="coins" id="coins">💰🪙💰🪙</div>

<div class="bottom-panel">
    <div>⭐ Пакеты: 5 = 10 игр | 10 = 25 игр | 20 = 60 игр</div>
    <div class="vip">💎 VIP ROOM — 50 Stars / 24 часа</div>
</div>

<script>
let rating1=1000;
let rating2=1000;
let fixed=false;

for(let i=1;i<=100;i++){
    p1.innerHTML += `<option>${i}</option>`;
    p2.innerHTML += `<option>${i}</option>`;
}

let time=15;

let timer=setInterval(()=>{
    if(fixed) return;

    time--;
    document.getElementById("timer").innerText="Выберите число: "+time;

    if(time<=0){
        clearInterval(timer);
        reveal();
    }
},1000);

function fixNumbers(){
    if(fixed) return;
    fixed=true;
    clearInterval(timer);
    reveal();
}

function reveal(){
    let circle=document.getElementById("circle");
    let count=3;

    let countdown=setInterval(()=>{
        circle.style.animation="none";
        circle.innerText=count;
        count--;

        if(count<0){
            clearInterval(countdown);

            let bot=Math.floor(Math.random()*100)+1;
            circle.innerText=bot;

            calculateWinner(bot);
        }
    },1000);
}

function calculateWinner(bot){
    let n1=parseInt(p1.value);
    let n2=parseInt(p2.value);

    let d1=Math.abs(n1-bot);
    let d2=Math.abs(n2-bot);

    let result=document.getElementById("result");

    if(d1<d2){
        result.innerText="🏆 Победил Игрок 1";
        rating1 += 25;
    }else if(d2<d1){
        result.innerText="🏆 Победил Игрок 2";
        rating2 += 25;
    }else{
        result.innerText="🤝 Ничья";
    }

    document.getElementById("player1info").innerText="Игрок 1 ⭐ Рейтинг: "+rating1;
    document.getElementById("player2info").innerText="Игрок 2 ⭐ Рейтинг: "+rating2;

    document.getElementById("crown").style.display="block";
    document.getElementById("coins").style.display="block";
}
</script>

</body>
</html>
