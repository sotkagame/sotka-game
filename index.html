<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOTKA 100 VIP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

body{
    background: radial-gradient(circle at top, #4b0a84 0%, #220044 60%, #100020 100%);
    color: gold;
}

.game{
    width:100%;
    height:100vh;
    padding:20px 16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
}

/* верх */
.crown{
    font-size:72px;
    margin-top:10px;
}

.title{
    font-size:76px;
    font-weight:700;
    line-height:1;
    text-shadow:0 0 20px rgba(255,215,0,0.7);
    margin-top:8px;
}

.number100{
    font-size:110px;
    font-weight:700;
    line-height:1;
    text-shadow:0 0 25px rgba(255,215,0,0.7);
    margin-top:10px;
}

.vip{
    font-size:34px;
    margin-top:8px;
}

/* игроки */
.players{
    width:100%;
    display:flex;
    justify-content:space-between;
    margin-top:40px;
}

.player{
    width:48%;
    text-align:center;
    font-size:20px;
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#ddd;
    border:4px solid gold;
    box-shadow:0 0 20px rgba(255,215,0,0.8);
    margin:0 auto 14px;
}

/* таймер */
.timer{
    margin-top:30px;
    font-size:56px;
    text-shadow:0 0 15px rgba(255,215,0,0.7);
}

/* центральный круг */
.circle{
    width:210px;
    height:210px;
    border-radius:50%;
    border:5px solid gold;
    box-shadow:0 0 25px rgba(255,215,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:96px;
    margin-top:25px;
}

/* число */
.choice{
    font-size:34px;
    margin-top:20px;
}

/* кнопки */
.buttons{
    width:100%;
    display:flex;
    gap:14px;
    margin-top:auto;
    padding-bottom:20px;
}

.btn{
    flex:1;
    height:90px;
    border-radius:20px;
    border:4px solid gold;
    background:rgba(255,255,255,0.04);
    box-shadow:0 0 15px rgba(255,215,0,0.4);
}
</style>
</head>

<body>

<div class="game">

    <div class="crown">👑</div>
    <div class="title">SOTKA</div>
    <div class="number100">100</div>
    <div class="vip">VIP стол</div>

    <div class="players">
        <div class="player">
            <div class="avatar"></div>
            Игрок 1 ⭐<br>
            Рейтинг: 1000
        </div>

        <div class="player">
            <div class="avatar"></div>
            Игрок 2 ⭐<br>
            Рейтинг: 1000
        </div>
    </div>

    <div class="timer">⏳ 30</div>

    <div class="circle">72</div>

    <div class="choice">Выберите число: 50</div>

    <div class="buttons">
        <div class="btn"></div>
        <div class="btn"></div>
    </div>

</div>

</body>
</html>
