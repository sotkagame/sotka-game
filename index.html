<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOTKA 100 VIP</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#120022;
}

/* Главное: фиксируем пропорции */
body{
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Игровой экран */
.game{
    width:min(100vw, 430px);
    height:min(100vh, 850px);
    aspect-ratio:9/16;
    background:radial-gradient(circle at top,#4b0a84,#1a0033 70%);
    color:gold;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    border-radius:30px;
    overflow:hidden;
}

/* Заголовок */
.title{
    font-size:58px;
    font-weight:700;
    text-shadow:0 0 25px gold;
    margin-top:10px;
}

.subtitle{
    font-size:28px;
    margin-top:8px;
}

/* Игроки */
.players{
    width:100%;
    display:flex;
    justify-content:space-between;
    margin-top:40px;
}

.player{
    width:45%;
    text-align:center;
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    background:#ddd;
    margin:0 auto 15px;
    border:4px solid gold;
    box-shadow:0 0 25px gold;
}

/* Таймер */
.timer{
    font-size:48px;
    margin-top:35px;
    text-shadow:0 0 20px gold;
}

/* Центральный круг */
.circle{
    width:250px;
    height:250px;
    border-radius:50%;
    border:6px solid gold;
    margin-top:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:120px;
    box-shadow:0 0 35px gold;
}

/* Текст */
.choice{
    font-size:32px;
    margin-top:25px;
}

/* Кнопки */
.buttons{
    width:100%;
    display:flex;
    gap:20px;
    margin-top:auto;
    padding-bottom:20px;
}

.btn{
    flex:1;
    height:110px;
    border-radius:25px;
    border:4px solid gold;
    background:rgba(255,255,255,0.06);
    box-shadow:0 0 20px rgba(255,215,0,0.4);
}
</style>
</head>

<body>

<div class="game">

    <div class="title">👑 SOTKA</div>
    <div class="title" style="font-size:72px;">100</div>
    <div class="subtitle">VIP стол</div>

    <div class="players">
        <div class="player">
            <div class="avatar"></div>
            Игрок 1 ⭐<br>Рейтинг: 1000
        </div>

        <div class="player">
            <div class="avatar"></div>
            Игрок 2 ⭐<br>Рейтинг: 1000
        </div>
    </div>

    <div class="timer">⏳ 30</div>

    <div class="circle">72</div>

    <div class="choice">Выберите число: 50</div>

    <div class="buttons">
        <div class="btn"></div>
        <div class="btn"></div>
    </div>

</div>

</body>
</html>
