<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOTKA 100 VIP</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background: radial-gradient(circle at top, #4b0082, #1a002f);
    overflow:hidden;
}

.container{
    width:100%;
    max-width:390px;
    height:100vh;
    margin:0 auto;
    padding:12px;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
    align-items:center;
    color:gold;
    text-align:center;
}

.title{
    font-size:48px;
    font-weight:bold;
    text-shadow:0 0 15px gold;
    line-height:1;
    margin-top:10px;
}

.number-top{
    font-size:80px;
    font-weight:bold;
    text-shadow:0 0 15px gold;
    margin-top:5px;
    line-height:1;
}

.subtitle{
    font-size:28px;
    margin-top:8px;
    margin-bottom:20px;
}

.players{
    width:100%;
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.player{
    width:45%;
    font-size:18px;
}

.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    background:linear-gradient(145deg,#ffffff,#d9d9d9);
    border:4px solid gold;
    box-shadow:0 0 15px gold;
    margin:0 auto 10px;
}

.timer{
    font-size:48px;
    margin-top:20px;
    text-shadow:0 0 15px gold;
}

.circle{
    width:180px;
    height:180px;
    border:6px solid gold;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:90px;
    margin-top:20px;
    box-shadow:0 0 20px gold;
}

.bottom-text{
    font-size:28px;
    margin-top:18px;
}
</style>
</head>

<body>
<div class="container">

<div class="title">👑 SOTKA</div>
<div class="number-top">100</div>
<div class="subtitle">VIP стол</div>

<div class="players">
    <div class="player">
        <div class="avatar"></div>
        Игрок 1 ⭐<br>
        Рейтинг: 1000
    </div>

    <div class="player">
        <div class="avatar"></div>
        Игрок 2 ⭐<br>
        Рейтинг: 1000
    </div>
</div>

<div class="timer">⏳ 30</div>

<div class="circle">30</div>

<div class="bottom-text">Выберите число: 54</div>

</div>
</body>
</html>
