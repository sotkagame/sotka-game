<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сотка 100</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    text-align: center;
    margin: 0;
    padding: 20px;
}
h1 {
    margin-bottom: 10px;
}
#botNumber {
    font-size: 60px;
    margin: 20px 0;
}
.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin: 20px 0;
}
select {
    width: 90px;
    height: 180px;
    font-size: 24px;
}
.info {
    font-size: 22px;
    margin: 15px 0;
}
</style>
</head>
<body>

<h1>СОТКА 💯</h1>

<div class="info">Игры: <span id="games">10</span></div>
<div class="info">Таймер: <span id="timer">7</span></div>

<div id="botNumber">?</div>

<div class="container">
    <div>
        <div>Игрок 1</div>
        <select id="player1" size="5"></select>
    </div>

    <div>
        <div>Игрок 2</div>
        <select id="player2" size="5"></select>
    </div>
</div>

<div class="info" id="result">Раунд начинается...</div>

<script>
let games = 10;
let bonusGiven = false;

const player1 = document.getElementById('player1');
const player2 = document.getElementById('player2');
const timerEl = document.getElementById('timer');
const resultEl = document.getElementById('result');
const botEl = document.getElementById('botNumber');
const gamesEl = document.getElementById('games');

for (let i = 1; i <= 100; i++) {
    let option1 = document.createElement('option');
    option1.value = i;
    option1.text = i;
    player1.appendChild(option1);

    let option2 = document.createElement('option');
    option2.value = i;
    option2.text = i;
    player2.appendChild(option2);
}

player1.value = 50;
player2.value = 50;

function startRound() {
    if (games <= 0) {
        if (!bonusGiven) {
            games = 5;
            bonusGiven = true;
            gamesEl.innerText = games;
            resultEl.innerText = "🎁 Подарочные 5 игр!";
        } else {
            resultEl.innerText = "⭐ Игры закончились";
            return;
        }
    }

    botEl.innerText = "?";
    resultEl.innerText = "Выберите числа за 7 секунд";
    startPlayerTimer();
}

function startPlayerTimer() {
    let time = 7;
    timerEl.innerText = time;

    let countdown = setInterval(() => {
        time--;
        timerEl.innerText = time;

        if (time <= 0) {
            clearInterval(countdown);
            startBotCountdown();
        }
    }, 1000);
}

function startBotCountdown() {
    let time = 3;
    resultEl.innerText = "🤖 Бот загадывает число...";
    timerEl.innerText = time;

    let countdown = setInterval(() => {
        time--;
        timerEl.innerText = time;

        if (time <= 0) {
            clearInterval(countdown);
            revealNumber();
        }
    }, 1000);
}

function revealNumber() {
    const bot = Math.floor(Math.random() * 100) + 1;
    const p1 = Number(player1.value);
    const p2 = Number(player2.value);

    botEl.innerText = bot;

    const diff1 = Math.abs(bot - p1);
    const diff2 = Math.abs(bot - p2);

    let resultText = "";

    if (diff1 < diff2) {
        resultText = "🏆 Победил Игрок 1";
    } else if (diff2 < diff1) {
        resultText = "🏆 Победил Игрок 2";
    } else {
        resultText = "🤝 Ничья";
    }

    resultEl.innerText = resultText;

    games--;
    gamesEl.innerText = games;

    setTimeout(startRound, 3000);
}

startRound();
</script>

</body>
</html>
