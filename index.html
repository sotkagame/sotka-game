<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOTKA 100 VIP</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    text-align:center;
    color:gold;
    min-height:100vh;
    background: radial-gradient(circle at top, #4b0082, #1a002f);
    overflow-y:auto;
}

.container{
    max-width:430px;
    margin:0 auto;
    padding:20px 15px 40px;
}

.title{
    font-size:60px;
    font-weight:bold;
    text-shadow:0 0 20px gold;
    line-height:1.1;
}

.subtitle{
    font-size:34px;
    margin-top:10px;
}

.players{
    display:flex;
    justify-content:space-between;
    margin-top:40px;
}

.player{
    width:45%;
    font-size:22px;
}

.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    background:linear-gradient(145deg,#ffffff,#d9d9d9);
    border:4px solid gold;
    box-shadow:0 0 20px gold;
    margin:0 auto 10px;
}

.timer{
    margin-top:40px;
    font-size:48px;
    text-shadow:0 0 15px gold;
}

.circle{
    width:230px;
    height:230px;
    border:8px solid gold;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:30px auto;
    font-size:110px;
    box-shadow:0 0 25px gold;
}

.number{
    font-size:42px;
    margin-bottom:30px;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-top:30px;
}

.vip-btn{
    padding:16px;
    font-size:24px;
    font-weight:bold;
    border:none;
    border-radius:18px;
    background:gold;
    color:#2b0055;
    box-shadow:0 0 20px gold;
}
</style>
</head>

<body>
<div class="container">

<div class="title">👑 SOTKA 100</div>
<div class="subtitle">VIP стол</div>

<div class="players">
    <div class="player">
        <div class="avatar"></div>
        Игрок 1 ⭐<br>
        Рейтинг: 1000
    </div>

    <div class="player">
        <div class="avatar"></div>
        Игрок 2 ⭐<br>
        Рейтинг: 1000
    </div>
</div>

<div class="timer">⏳ 30</div>

<div class="circle">30</div>

<div class="number">Выберите число: 54</div>

<div class="buttons">
    <button class="vip-btn" onclick="alert('VIP пакет 100 ⭐ скоро будет доступен')">
        Получить VIP пакет ⭐100
    </button>

    <button class="vip-btn" onclick="alert('VIP пакет 500 ⭐ скоро будет доступен')">
        Получить VIP пакет ⭐500
    </button>
</div>

</div>
</body>
</html>
