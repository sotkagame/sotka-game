<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOTKA VIP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    background: radial-gradient(circle at top, #4b0082 0%, #1b002d 70%, #0d0015 100%);
    color:gold;
}

.game{
    width:100%;
    max-width:430px;
    height:100vh;
    margin:0 auto;
    padding:8px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* header */
.header{
    border:2px solid goldenrod;
    border-radius:18px;
    padding:10px;
    text-align:center;
}

.logo{
    font-size:44px;
    font-weight:900;
}

.number{
    font-size:62px;
    font-weight:900;
    line-height:1;
}

.vip{
    font-size:22px;
}

/* top row */
.top{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.card{
    width:120px;
    border:2px solid goldenrod;
    border-radius:16px;
    padding:8px;
    text-align:center;
    font-size:16px;
}

.timer{
    font-size:42px;
    font-weight:bold;
}

/* middle */
.middle{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex:1;
    min-height:0;
}

.wheel{
    width:80px;
    height:250px;
    overflow-y:auto;
    border:2px solid goldenrod;
    border-radius:18px;
    text-align:center;
    scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;
}

.wheel::-webkit-scrollbar{
    display:none;
}

.num{
    height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
    font-weight:bold;
    scroll-snap-align:center;
}

.center{
    width:180px;
    text-align:center;
}

.circle{
    width:140px;
    height:140px;
    margin:0 auto;
    border:4px solid gold;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    font-weight:bold;
    box-shadow:0 0 16px rgba(255,215,0,0.5);
}

.center-text{
    margin-top:12px;
    font-size:28px;
    font-weight:bold;
}

.rating{
    margin-top:16px;
    font-size:18px;
}

/* buttons */
.buttons{
    margin-top:8px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.btn{
    height:56px;
    border:2px solid goldenrod;
    border-radius:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:26px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="game">

    <div class="header">
        <div class="logo">👑 SOTKA</div>
        <div class="number">100</div>
        <div class="vip">VIP стол</div>
    </div>

    <div class="top">
        <div class="card">Stan<br>🥇 Gold</div>
        <div class="timer">⏳ 14</div>
        <div class="card">Opponent<br>🥈 Silver</div>
    </div>

    <div class="middle">
        <div class="wheel" id="leftWheel"></div>

        <div class="center">
            <div class="circle" id="selected">50</div>
            <div class="center-text">УГАДАЙ ЧИСЛО</div>
            <div class="rating">Рейтинг: 1000 / 1000</div>
        </div>

        <div class="wheel" id="rightWheel"></div>
    </div>

    <div class="buttons">
        <div class="btn">⭐ Купить пакет</div>
        <div class="btn">👑 VIP 24 часа</div>
    </div>

</div>

<script>
const left = document.getElementById('leftWheel');
const right = document.getElementById('rightWheel');
const selected = document.getElementById('selected');

for(let i=1;i<=100;i++){
    left.innerHTML += `<div class="num">${i}</div>`;
    right.innerHTML += `<div class="num">${i}</div>`;
}

function updateSelected(wheel){
    const index = Math.round(wheel.scrollTop / 80) + 1;
    selected.innerText = index;
}

left.addEventListener('scroll', ()=>updateSelected(left));
right.addEventListener('scroll', ()=>updateSelected(right));
</script>

</body>
</html>
