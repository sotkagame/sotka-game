<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOTKA 100 VIP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#140028;
}

/* КЛЮЧЕВОЕ ИСПРАВЛЕНИЕ */
body{
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

/* Фиксированный экран */
.game{
    width:100vw;
    max-width:430px;
    height:100vh;
    max-height:820px;
    overflow:hidden;
    background:
        radial-gradient(circle at top, #4b0a84 0%, #220044 55%, #100020 100%);
    color:gold;
    padding:20px;
}

/* Заголовок */
.title{
    text-align:center;
    font-size:88px;
    font-weight:700;
    line-height:1;
    text-shadow:0 0 25px gold;
}

.vip{
    text-align:center;
    font-size:34px;
    margin-top:15px;
}

/* Игроки */
.players{
    display:flex;
    justify-content:space-between;
    margin-top:60px;
}

.player{
    width:48%;
    text-align:center;
    font-size:24px;
}

.avatar{
    width:140px;
    height:140px;
    border-radius:50%;
    background:#ddd;
    border:5px solid gold;
    box-shadow:0 0 30px gold;
    margin:0 auto 20px;
}

/* Таймер */
.timer{
    margin-top:60px;
    text-align:center;
    font-size:72px;
    text-shadow:0 0 20px gold;
}

/* Центральный круг */
.circle{
    width:260px;
    height:260px;
    border-radius:50%;
    border:6px solid gold;
    box-shadow:0 0 35px gold;
    margin:40px auto 0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:120px;
}

/* Выбор */
.choice{
    margin-top:25px;
    text-align:center;
    font-size:42px;
}

/* Нижние кнопки */
.buttons{
    display:flex;
    gap:20px;
    margin-top:35px;
}

.btn{
    flex:1;
    height:110px;
    border-radius:25px;
    border:4px solid gold;
    background:rgba(255,255,255,0.04);
    box-shadow:0 0 18px rgba(255,215,0,0.4);
}
</style>
</head>

<body>

<div class="game">

    <div style="text-align:center; font-size:80px;">👑 SOTKA</div>
    <div class="title">100</div>
    <div class="vip">VIP стол</div>

    <div class="players">
        <div class="player">
            <div class="avatar"></div>
            Игрок 1 ⭐<br>Рейтинг: 1000
        </div>

        <div class="player">
            <div class="avatar"></div>
            Игрок 2 ⭐<br>Рейтинг: 1000
        </div>
    </div>

    <div class="timer">⏳ 30</div>

    <div class="circle">72</div>

    <div class="choice">Выберите число: 50</div>

    <div class="buttons">
        <div class="btn"></div>
        <div class="btn"></div>
    </div>

</div>

</body>
</html>
