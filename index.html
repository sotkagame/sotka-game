<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOTKA VIP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background: radial-gradient(circle at top, #4b0082 0%, #1b002d 70%, #0d0015 100%);
    color:gold;
}

.game{
    width:100%;
    max-width:430px;
    margin:0 auto;
    padding:12px;
}

/* шапка */
.header{
    text-align:center;
    border:3px solid goldenrod;
    border-radius:16px;
    padding:10px;
    background:rgba(0,0,0,0.25);
    box-shadow:0 0 16px rgba(255,215,0,0.35);
}

.logo{
    font-size:46px;
    font-weight:900;
    letter-spacing:2px;
}

.vip{
    margin-top:6px;
    font-size:20px;
}

/* верхняя линия */
.top-row{
    margin-top:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.player-card{
    width:110px;
    border:2px solid goldenrod;
    border-radius:14px;
    padding:8px;
    text-align:center;
    background:rgba(0,0,0,0.25);
}

.player-name{
    font-size:20px;
    font-weight:bold;
}

.rank{
    margin-top:4px;
    font-size:14px;
}

.timer{
    font-size:34px;
    font-weight:bold;
}

/* центр */
.main{
    margin-top:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.side-panel{
    width:80px;
    height:260px;
    border:3px solid goldenrod;
    border-radius:16px;
    background:rgba(0,0,0,0.25);
    display:flex;
    flex-direction:column;
    justify-content:space-around;
    align-items:center;
    font-size:28px;
    font-weight:bold;
}

.center{
    width:180px;
    text-align:center;
}

.circle{
    width:140px;
    height:140px;
    margin:0 auto;
    border:4px solid gold;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    box-shadow:0 0 18px rgba(255,215,0,0.6);
}

.center-text{
    margin-top:14px;
    font-size:24px;
    font-weight:bold;
}

.rating{
    margin-top:30px;
    font-size:18px;
}

/* кнопки */
.buttons{
    margin-top:24px;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.btn{
    height:64px;
    border:3px solid goldenrod;
    border-radius:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:bold;
    background:rgba(0,0,0,0.25);
}
</style>
</head>

<body>

<div class="game">

    <div class="header">
        <div class="logo">👑 SOTKA 100</div>
        <div class="vip">VIP стол</div>
    </div>

    <div class="top-row">
        <div class="player-card">
            <div class="player-name">Stan</div>
            <div class="rank">🥇 Gold</div>
        </div>

        <div class="timer">⏳ 14</div>

        <div class="player-card">
            <div class="player-name">Opponent</div>
            <div class="rank">🥈 Silver</div>
        </div>
    </div>

    <div class="main">
        <div class="side-panel">
            <div>46</div>
            <div>47</div>
            <div>48</div>
        </div>

        <div class="center">
            <div class="circle">?</div>
            <div class="center-text">УГАДАЙ ЧИСЛО</div>
            <div class="rating">Рейтинг: 1000 / 1000</div>
        </div>

        <div class="side-panel">
            <div>46</div>
            <div>47</div>
            <div>48</div>
        </div>
    </div>

    <div class="buttons">
        <div class="btn">⭐ Купить пакет</div>
        <div class="btn">👑 VIP 24 часа</div>
    </div>

</div>

</body>
</html>
