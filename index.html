<div class="game-wrap">

  <div class="score-row">
    <div class="side-box left">
      <div class="num">49</div>
      <div class="num">50</div>
      <div class="num">51</div>
      <div class="num">52</div>
    </div>

    <div class="center-box">
      <div class="question-circle">
        <div class="rotating-question">?</div>
      </div>

      <div class="pick-row">
        <div class="pick-circle" id="leftPick">--</div>
        <div class="pick-circle" id="rightPick">--</div>
      </div>

      <div class="question-text">УГАДАЙ<br>ЧИСЛО</div>

      <div class="rating-box">
        Рейтинг: 1000 / 1000
      </div>
    </div>

    <div class="side-box right">
      <div class="num">45</div>
      <div class="num">46</div>
      <div class="num">47</div>
      <div class="num">48</div>
    </div>
  </div>

</div>

<style>
.game-wrap{
    width:100%;
    max-width:430px;
    margin:0 auto;
    padding:12px;
    box-sizing:border-box;
}

.score-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    width:100%;
}

.side-box{
    width:22%;
    min-height:280px;
    border:3px solid gold;
    border-radius:22px;
    display:flex;
    flex-direction:column;
    justify-content:space-around;
    align-items:center;
    padding:15px 0;
    box-sizing:border-box;
}

.num{
    font-size:clamp(28px, 6vw, 52px);
    font-weight:700;
    color:gold;
    line-height:1;
    cursor:pointer;
}

.center-box{
    width:50%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.question-circle{
    width:min(34vw, 180px);
    height:min(34vw, 180px);
    border:5px solid gold;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:clamp(60px, 10vw, 90px);
    font-weight:700;
    color:gold;
    box-shadow:0 0 25px gold;
}

.rotating-question{
    animation: slowSpin 6s linear infinite;
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    height:100%;
}

@keyframes slowSpin{
    from{
        transform: rotateY(0deg);
    }
    to{
        transform: rotateY(360deg);
    }
}

.pick-row{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:15px;
}

.pick-circle{
    width:60px;
    height:60px;
    border:3px solid gold;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:gold;
    font-size:26px;
    font-weight:700;
}

.question-text{
    margin-top:14px;
    text-align:center;
    font-size:clamp(20px, 4vw, 34px);
    font-weight:700;
    color:gold;
    line-height:1.1;
}

.rating-box{
    margin-top:20px;
    text-align:center;
    font-size:clamp(20px, 4vw, 30px);
    color:gold;
    font-weight:600;
}

@media (max-width:430px){
    .score-row{
        gap:8px;
    }

    .side-box{
        min-height:240px;
    }
}
</style>

<script>
document.querySelectorAll('.num').forEach(num=>{
    num.addEventListener('click', function(){

        const value = this.innerText;

        if(this.closest('.left')){
            document.getElementById('leftPick').innerText = value;
        }

        if(this.closest('.right')){
            document.getElementById('rightPick').innerText = value;
        }

        this.style.transform = 'scale(1.15)';
        this.style.textShadow = '0 0 15px gold';
    });
});
</script>
