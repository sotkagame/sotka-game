<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOTKA 100 VIP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

body{
    background: radial-gradient(circle at top, #4b0a84 0%, #220044 60%, #100020 100%);
    color: gold;
    display:flex;
    justify-content:center;
}

.game{
    width:100%;
    max-width:430px;
    min-height:100vh;
    padding:14px 14px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* верх */
.crown{
    font-size:48px;
    margin-top:4px;
}

.title{
    font-size:52px;
    font-weight:700;
    line-height:1;
    text-shadow:0 0 14px rgba(255,215,0,0.7);
}

.number100{
    font-size:72px;
    font-weight:700;
    line-height:1;
    text-shadow:0 0 16px rgba(255,215,0,0.7);
    margin-top:4px;
}

.vip{
    font-size:24px;
    margin-top:2px;
}

/* игроки */
.players{
    width:100%;
    display:flex;
    justify-content:space-between;
    margin-top:18px;
}

.player{
    width:48%;
    text-align:center;
    font-size:16px;
}

.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#ddd;
    border:4px solid gold;
    box-shadow:0 0 14px rgba(255,215,0,0.8);
    margin:0 auto 8px;
}

/* таймер */
.timer{
    margin-top:16px;
    font-size:36px;
    text-shadow:0 0 10px rgba(255,215,0,0.7);
}

/* центральный круг */
.circle{
    width:130px;
    height:130px;
    border-radius:50%;
    border:5px solid gold;
    box-shadow:0 0 16px rgba(255,215,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:64px;
    margin-top:14px;
}

/* число */
.choice{
    font-size:24px;
    margin-top:12px;
}

/* кнопки */
.buttons{
    width:100%;
    display:flex;
    gap:12px;
    margin-top:18px;
}

.btn{
    flex:1;
    height:64px;
    border-radius:18px;
    border:4px solid gold;
    background:rgba(255,255,255,0.04);
    box-shadow:0 0 10px rgba(255,215,0,0.4);
}
</style>
</head>

<body>

<div class="game">

    <div class="crown">👑</div>
    <div class="title">SOTKA</div>
    <div class="number100">100</div>
    <div class="vip">VIP стол</div>

    <div class="players">
        <div class="player">
            <div class="avatar"></div>
            Игрок 1 ⭐<br>
            Рейтинг: 1000
        </div>

        <div class="player">
            <div class="avatar"></div>
            Игрок 2 ⭐<br>
            Рейтинг: 1000
        </div>
    </div>

    <div class="timer">⏳ 11</div>

    <div class="circle">?</div>

    <div class="choice">Выберите число: 50</div>

    <div class="buttons">
        <div class="btn"></div>
        <div class="btn"></div>
    </div>

</div>

</body>
</html>
