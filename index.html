<div class="vip-screen">

  <!-- Верх -->
  <div class="top-box">
    <div class="logo">👑 SOTKA</div>
    <div class="title-number">100</div>
    <div class="vip-label">VIP стол</div>
  </div>

  <!-- Игроки -->
  <div class="players-row">
    <div class="player-card">
      <div>Stan</div>
      <div>🥇 Gold</div>
    </div>

    <div class="timer-box">⏳ 14</div>

    <div class="player-card">
      <div>Opponent</div>
      <div>🥈 Silver</div>
    </div>
  </div>

  <!-- Игровое поле -->
  <div class="game-area">

    <div class="side-box left">
      <div class="num">49</div>
      <div class="num">50</div>
      <div class="num">51</div>
      <div class="num">52</div>
    </div>

    <div class="center-box">
      <div class="question-circle">
        <div class="rotating-question">?</div>
      </div>

      <div class="pick-row">
        <div class="pick-circle" id="leftPick">--</div>
        <div class="pick-circle" id="rightPick">--</div>
      </div>

      <div class="question-text">УГАДАЙ<br>ЧИСЛО</div>
      <div class="main-number">45</div>

      <div class="rating-box">Рейтинг: 1000 / 1000</div>
    </div>

    <div class="side-box right">
      <div class="num">45</div>
      <div class="num">46</div>
      <div class="num">47</div>
      <div class="num">48</div>
    </div>

  </div>

  <!-- VIP пакет -->
  <details class="vip-pack">
    <summary>⭐ VIP пакет / получить звёзды</summary>
    <div class="vip-content">
      <div class="star-option">⭐ 100 звёзд</div>
      <div class="star-option">⭐ 500 звёзд</div>
      <div class="star-option">⭐ 1000 звёзд</div>
    </div>
  </details>

</div>

<style>
body{
    margin:0;
    background:#2b004f;
    font-family:Arial, sans-serif;
}

.vip-screen{
    width:100%;
    max-width:430px;
    margin:0 auto;
    padding:12px;
    color:gold;
    box-sizing:border-box;
}

.top-box{
    border:3px solid gold;
    border-radius:24px;
    padding:20px;
    text-align:center;
    margin-bottom:16px;
}

.logo{
    font-size:52px;
    font-weight:700;
}

.title-number{
    font-size:92px;
    font-weight:700;
}

.vip-label{
    font-size:34px;
}

.players-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.player-card{
    width:30%;
    border:3px solid gold;
    border-radius:20px;
    padding:12px;
    text-align:center;
    font-size:20px;
}

.timer-box{
    font-size:42px;
    font-weight:700;
}

.game-area{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.side-box{
    width:22%;
    min-height:300px;
    border:3px solid gold;
    border-radius:22px;
    display:flex;
    flex-direction:column;
    justify-content:space-around;
    align-items:center;
}

.num{
    font-size:52px;
    font-weight:700;
    cursor:pointer;
}

.center-box{
    width:50%;
    text-align:center;
}

.question-circle{
    width:180px;
    height:180px;
    margin:0 auto;
    border:5px solid gold;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 25px gold;
}

.rotating-question{
    font-size:92px;
    animation: spin 6s linear infinite;
}

@keyframes spin{
    from{transform:rotateY(0deg);}
    to{transform:rotateY(360deg);}
}

.pick-row{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:15px;
}

.pick-circle{
    width:55px;
    height:55px;
    border:3px solid gold;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
}

.question-text{
    margin-top:12px;
    font-size:28px;
    font-weight:700;
}

.main-number{
    font-size:58px;
    font-weight:700;
}

.rating-box{
    font-size:22px;
    margin-top:10px;
}

.vip-pack{
    margin-top:24px;
    border:3px solid gold;
    border-radius:20px;
    padding:12px;
}

summary{
    font-size:24px;
    cursor:pointer;
}

.star-option{
    margin-top:10px;
    font-size:22px;
}
</style>

<script>
document.querySelectorAll('.num').forEach(num=>{
    num.addEventListener('click', function(){
        const value = this.innerText;

        if(this.closest('.left')){
            document.getElementById('leftPick').innerText = value;
        }

        if(this.closest('.right')){
            document.getElementById('rightPick').innerText = value;
        }
    });
});
</script>
